<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Praia - Cardápio Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ocean-blue: #0066cc;
            --deep-blue: #004499;
            --sun-orange: #ff8c00;
            --sun-yellow: #ffb700;
            --sand: #f4e4c1;
            --white: #ffffff;
            --dark: #1a1a2e;
            --gray: #666666;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--ocean-blue) 0%, var(--deep-blue) 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ocean-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: var(--sun-yellow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent);
        }

        .logo-container {
            max-width: 400px;
            margin: 0 auto;
            position: relative;
        }

        .logo {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            font-family: 'Pacifico', cursive;
            color: var(--sun-yellow);
            font-size: 1.5rem;
            margin-top: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .menu-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .menu-title h1 {
            font-family: 'Pacifico', cursive;
            color: var(--white);
            font-size: 3rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .menu-title p {
            color: var(--sand);
            font-size: 1.1rem;
        }

        .section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            background: linear-gradient(135deg, var(--sun-orange) 0%, var(--sun-yellow) 100%);
            color: var(--white);
            padding: 20px 30px;
            font-family: 'Pacifico', cursive;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header:hover {
            filter: brightness(1.1);
        }

        .section-header .icon {
            font-size: 2.5rem;
            opacity: 0.3;
            margin-left: 10px;
        }

        .section-header .toggle {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
            margin-left: 10px;
        }

        .section.collapsed .toggle {
            transform: rotate(-90deg);
        }

        .section-content {
            padding: 30px;
            transition: all 0.3s ease;
        }

        .section.collapsed .section-content {
            display: none;
        }

        .subcategory {
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out;
        }

        .subcategory:last-child {
            margin-bottom: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .subcategory-title {
            color: var(--ocean-blue);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--sun-yellow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subcategory-icon {
            font-size: 1.5rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,102,204,0.2);
            border-color: var(--sun-yellow);
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--sun-orange), var(--sun-yellow));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .product-card:hover::before {
            transform: scaleX(1);
        }

        .product-card.indisponivel {
            opacity: 0.6;
            background: #f0f0f0;
        }

        .product-card.indisponivel::after {
            content: 'INDISPONIVEL';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            background: rgba(255,0,0,0.8);
            color: white;
            padding: 5px 15px;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 5px;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 10px;
        }

        .product-name {
            font-weight: 700;
            color: var(--dark);
            font-size: 1.1rem;
            flex: 1;
        }

        .product-price {
            background: linear-gradient(135deg, var(--sun-orange) 0%, var(--sun-yellow) 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(255,140,0,0.3);
        }

        .product-description {
            color: var(--gray);
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .product-badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .product-banner {
            display: inline-block;
            background: var(--ocean-blue);
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-banner.destaque {
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,71,87,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255,71,87,0); }
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--white);
        }

        .footer p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .social-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: var(--white);
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            transform: scale(1.2);
            color: var(--sun-yellow);
        }

        @media (max-width: 768px) {
            .menu-title h1 {
                font-size: 2rem;
            }

            .section-header {
                font-size: 1.5rem;
                padding: 15px 20px;
            }

            .section-content {
                padding: 20px;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                background: white;
            }

            .section {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
        }
    </style>

        function renderMenu(data) {
            document.title = data.restaurante.nome + ' - Cardápio';
            document.getElementById('logo-img').src = data.restaurante.logo;
            document.getElementById('logo-img').alt = data.restaurante.nome;
            document.getElementById('slogan').textContent = data.restaurante.slogan;
            document.getElementById('footer-nome').textContent = '🌴 ' + data.restaurante.nome + ' ' + data.restaurante.subtitulo + ' 🌴';

            const menuContainer = document.getElementById('menu-container');
            menuContainer.innerHTML = '';

            data.cardapio.forEach((secao) => {
                const sectionEl = document.createElement('section');
                sectionEl.className = 'section';
                sectionEl.innerHTML = `
                    <div class="section-header" onclick="toggleSection(this)">
                        <span>${secao.titulo}</span>
                        <div style="display: flex; align-items: center;">
                            <span class="icon">${secao.icone}</span>
                            <span class="toggle">[v]</span>
                        </div>
                    </div>
                    <div class="section-content" id="section-${secao.id}"></div>
                `;

                const contentEl = sectionEl.querySelector(`#section-${secao.id}`);

                secao.subcategorias.forEach(sub => {
                    const subEl = document.createElement('div');
                    subEl.className = 'subcategory';

                    let produtosHTML = '';
                    sub.produtos.forEach(prod => {
                        const disponivelClass = prod.disponivel ? '' : 'indisponivel';
                        const unidadeHTML = prod.unidade ? `<span class="product-banner">${prod.unidade}</span>` : '';
                        const destaqueHTML = prod.destaque ? `<span class="product-banner destaque">⭐ TOP</span>` : '';

                        produtosHTML += `
                            <div class="product-card ${disponivelClass}" data-id="${prod.id}">
                                <div class="product-header">
                                    <span class="product-name">${prod.nome}</span>
                                    <span class="product-price">${data.config.moeda} ${prod.preco}</span>
                                </div>
                                <p class="product-description">${prod.descricao}</p>
                                <div class="product-badges">
                                    ${unidadeHTML}
                                    ${destaqueHTML}
                                </div>
                            </div>
                        `;
                    });

                    subEl.innerHTML = `
                        <h3 class="subcategory-title">
                            <span class="subcategory-icon">${sub.icone}</span>
                            ${sub.titulo}
                        </h3>
                        <div class="products-grid">
                            ${produtosHTML}
                        </div>
                    `;

                    contentEl.appendChild(subEl);
                });

                menuContainer.appendChild(sectionEl);
            });

            const socialContainer = document.getElementById('social-links');
            const instagram = data.restaurante.contato.instagram.replace('@', '');
            const whatsapp = data.restaurante.contato.whatsapp.replace(/\D/g, '');
            socialContainer.innerHTML = `
                <a href="https://instagram.com/${instagram}" title="Instagram">📷</a>
                <a href="https://wa.me/${whatsapp}" title="WhatsApp">📱</a>
            `;

            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        }

        function toggleSection(header) {
            const section = header.parentElement;
            section.classList.toggle('collapsed');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderMenu(MENU_DATA);
        });
    </script>
</body>
</html>
